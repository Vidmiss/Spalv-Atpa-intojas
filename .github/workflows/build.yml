name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kodas
        uses: actions/checkout@v4

      - name: Java 17 nustatymas
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle wrapper leidimas
        run: chmod +x ./gradlew

      - name: Sukompiliuoti APK
        run: ./gradlew assembleDebug

      - name: Įkelti APK kaip artefaktą
        uses: actions/upload-artifact@v4
        with:
          name: ColorNN-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
